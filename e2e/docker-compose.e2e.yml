# Ephemeral stack for the E2E test suite — spun up fresh per CI run, torn
# down after. This is NOT the production docker-compose.yml: it has its own
# throwaway Postgres (production's DB is a separately-managed long-lived
# container this stack never touches) and a CUPS sidecar with only a
# virtual PDF printer, so print jobs are exercised for real without ever
# reaching a physical printer.
#
# Ports are published to the host because Playwright's browser runs on the
# CI runner itself, not inside this compose network — it can't resolve
# service names like `backend` or `frontend`.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      # Must match DB_NAME + "-dev" below — backend's Settings.DB_PATH
      # computed field appends "-dev"/"-prod" to DB_NAME depending on
      # ENVIRONMENT, so the actual database name Postgres needs to have
      # ready isn't DB_NAME verbatim.
      POSTGRES_DB: printbuddy-e2e-dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e -d printbuddy-e2e-dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  cups-sidecar:
    build: ./cups-sidecar
    # No ports published — only the backend container (inside this compose
    # network) needs to reach it, via CUPS_SERVER=cups-sidecar:631.

  backend:
    image: ${BACKEND_IMAGE}
    ports:
      - "8000:8000"
    environment:
      PROJECT_NAME: PrintBuddy E2E
      VERSION: e2e
      ENVIRONMENT: development
      URL: localhost
      CORS_ORIGINS: http://localhost:8080
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE_MB: 50
      PRINTER_MARKERS_DB: /app/printer_markers.db
      CUPS_SERVER: cups-sidecar:631
      SECRET_KEY: e2e-test-secret-key-not-for-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXP_MIN: 60
      PWD_RESET_SALT: e2e-test-salt
      PWD_RESET_URL: http://localhost:8080/password-reset
      PWD_RESET_TIME_MIN: 30
      TELEGRAM_SECRET: e2e-test-telegram-secret
      DB_SCHEME: postgresql+psycopg
      DB_HOSTNAME: postgres
      DB_USER: e2e
      DB_PASSWORD: e2e
      DB_NAME: printbuddy-e2e
      MAIL_USERNAME: e2e@example.com
      MAIL_PASSWORD: unused
      MAIL_FROM: e2e@example.com
      MAIL_FROM_NAME: PrintBuddy E2E
      MAIL_PORT: 587
      MAIL_SERVER: localhost
    depends_on:
      postgres:
        condition: service_healthy
      cups-sidecar:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - "8080:80"
    environment:
      # nginx's own /api/ reverse proxy — unused by the current frontend
      # (services/api.js calls the absolute VITE_API_BASE_URL directly,
      # baked in at build time, not a relative /api path), but envsubst
      # needs a syntactically valid value here for nginx to start at all.
      BACKEND_URL: http://backend:8000/api/
    depends_on:
      backend:
        condition: service_healthy
