services:
  backend:
    image: ghcr.io/printbuddy/print-buddy-backend:${BACKEND_TAG:-latest}
    container_name: backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - "${CUPS_HOST}:${CUPS_HOST}"
      - "${UPLOADS_HOST}:/app/uploads"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/printbuddy/print-buddy-frontend:${FRONTEND_TAG:-latest}
    container_name: frontend
    env_file:
      - .env
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  bot:
    image: ghcr.io/printbuddy/print-bot:${BOT_TAG:-latest}
    container_name: bot
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    # Postgres runs as its own long-lived container, managed separately
    # (see README — "Why Postgres isn't in this file"). This stack joins
    # its existing network rather than defining a postgres service of its
    # own, so DB_HOSTNAME=postgres in .env resolves correctly without this
    # compose project ever touching the database container or its volume.
    name: print-buddy-app_default
    external: true
